kind = "web"
previewPath = "/"
title = "VideoTools Pro"
version = "1.0.0"
id = "artifacts/videotools-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20881

[services.development]
run = "pnpm --filter @workspace/videotools-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/videotools-pro", "run", "build" ]
publicDir = "artifacts/videotools-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20881"
BASE_PATH = "/"
